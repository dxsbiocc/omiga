<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background: indigo/violet, clearly visible -->
    <rect width="1024" height="1024" fill="#2d2f8f"/>

    <!-- Subtle lighter centre -->
    <ellipse cx="512" cy="430" rx="420" ry="380" fill="#3d3fa8" opacity="0.6"/>

    <!--
      Momentum symbol.
      Original 100×100 path, scale 9.7, centered at (512,512):
        translate = (512-50×9.7, 512-47.5×9.7) = (27, 51)
    -->
    <g transform="translate(27, 51) scale(9.7)">

      <!-- Main Omega brushstroke — white so it pops on any background -->
      <path
        d="M15 80 Q 40 75, 45 40 Q 50 15, 55 40 Q 60 75, 85 80"
        fill="none"
        stroke="#e0f2fe"
        stroke-width="5"
        stroke-linecap="round"
      />

      <!-- Qi ripple 1 — light violet -->
      <path
        d="M40 62 Q 50 55, 60 62"
        fill="none"
        stroke="#c4b5fd"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.85"
      />

      <!-- Qi ripple 2 -->
      <path
        d="M44 70 Q 50 66, 56 70"
        fill="none"
        stroke="#c4b5fd"
        stroke-width="1.3"
        stroke-linecap="round"
        opacity="0.6"
      />

      <!-- Top dot — sky blue -->
      <circle cx="50" cy="18" r="2.2" fill="#7dd3fc"/>

    </g>
  </g>
</svg>
