apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: seqtk_size
  version: 0.1.0
  name: seqtk Size
  description: Use seqtk size to count total reads and total bases in FASTQ/FASTA input.
  tags: [seqtk, fastq, fasta, sequencing]
interface:
  inputs:
    reads:
      kind: file
      required: true
      description: FASTQ/FASTA input whose read count and total bases should be computed.
  params: {}
  outputs:
    summary:
      kind: json
      required: true
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 300s
    exposed: true
execution:
  argv:
    - /bin/sh
    - ./scripts/seqtk_size.sh
    - ${inputs.reads}
    - ${outdir}
