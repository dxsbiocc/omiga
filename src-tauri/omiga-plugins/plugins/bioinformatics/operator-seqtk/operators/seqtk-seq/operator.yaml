apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: seqtk_seq
  version: 0.1.0
  name: seqtk Seq
  description: Use seqtk seq for FASTQ/FASTA conversion, reverse-complementing, and quality masking.
  tags: [seqtk, fastq, fasta, conversion]
interface:
  inputs:
    reads:
      kind: file
      required: true
      description: FASTQ/FASTA input readable by seqtk seq.
  params:
    output_format:
      kind: string
      default: fastq
      enum: [fastq, fasta]
      description: Output format to request; fasta uses seqtk seq -A to discard qualities.
    reverse_complement:
      kind: boolean
      default: false
      description: Whether to reverse-complement reads with seqtk seq -r.
    qual_threshold:
      kind: integer
      default: 0
      description: Optional quality threshold (-q N) for masking low-quality bases; use 0 to omit.
  outputs:
    converted_reads:
      kind: file
      glob: seqtk-seq*
      required: true
    summary:
      kind: json
      required: true
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 300s
    exposed: true
execution:
  argv:
    - /bin/sh
    - ./scripts/seqtk_seq.sh
    - ${inputs.reads}
    - ${outdir}
    - ${params.output_format}
    - ${params.reverse_complement}
    - ${params.qual_threshold}
