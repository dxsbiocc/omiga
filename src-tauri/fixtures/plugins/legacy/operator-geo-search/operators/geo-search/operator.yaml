apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: geo_search
  version: 0.1.0
  name: GEO Search
  description: Additive Operator pilot for NCBI GEO DataSets E-utilities search with offline fixture parity support.
  tags: [retrieval, dataset, geo, external-network, operator-pilot]
interface:
  inputs: {}
  params:
    query:
      kind: string
      required: true
      non_empty: true
      description: NCBI GEO DataSets query string or GEO accession.
    limit:
      kind: integer
      default: 10
      minimum: 1
      maximum: 100
      description: Maximum records to return.
    mode:
      kind: enum
      enum: [auto, live, offline_fixture]
      default: auto
      description: auto uses fixture_json when supplied, otherwise live NCBI E-utilities; offline_fixture requires fixture_json.
    fixture_json:
      kind: string
      default: ""
      description: Optional offline fixture JSON path for deterministic tests or recorded comparisons.
    email:
      kind: string
      default: ""
      description: Optional NCBI email parameter for live E-utilities calls.
  outputs:
    results:
      kind: file
      glob: geo-results.tsv
      required: true
    summary:
      kind: json
      required: true
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
cache:
  enabled: true
  policyVersion: external-network/v1
  fixtureParam: fixture_json
  modeParam: mode
  offlineMode: offline_fixture
  recordedFixture: ./examples/geo_fixture.json
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 120s
    exposed: true
permissions:
  sideEffects: [external_network]
  network:
    hosts: [eutils.ncbi.nlm.nih.gov]
    mode: read_only
execution:
  argv:
    - python3
    - ./scripts/geo_search.py
    - ${outdir}
    - ${params.query}
    - ${params.limit}
    - ${params.mode}
    - ${params.fixture_json}
    - ${params.email}
