apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: omics_differential_expression_basic
  version: 0.1.0
  name: Basic Differential Expression
  description: Run bulk RNA-seq differential expression with DESeq2/edgeR/limma priority and Wilcoxon, chi-square, or t-test fallbacks over one or more metadata group comparisons.
  tags: [omics, differential-expression, bulk-rnaseq, deseq2, edger, limma, r]
interface:
  inputs:
    matrix:
      kind: file
      required: true
      description: Numeric feature-by-sample matrix with feature ids in the first column by default.
    metadata:
      kind: file
      required: true
      description: Sample metadata table containing sample and group columns.
  params:
    group_column:
      kind: string
      required: true
      non_empty: true
      description: Metadata column containing group labels.
    case_group:
      kind: string
      default: ""
      description: Optional numerator/case group. When omitted with control_group, all pairwise group comparisons are run.
    control_group:
      kind: string
      default: ""
      description: Optional denominator/control group. When omitted with case_group, all pairwise group comparisons are run.
    sample_column:
      kind: string
      default: sample
      non_empty: true
      description: Metadata column containing sample ids matching matrix columns.
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    row_names:
      kind: boolean
      default: true
    pseudocount:
      kind: number
      default: 1
      minimum: 0
    log2fc_threshold:
      kind: number
      default: 1
      minimum: 0
    pvalue_threshold:
      kind: number
      default: 0.05
      minimum: 0
      maximum: 1
    comparisons:
      kind: string
      default: ""
      description: Optional comparison list such as "A:B,B:C" or "A vs B; A vs C". Overrides case/control groups.
    stat_test:
      kind: enum
      enum: [welch, t_test, wilcoxon, chi_square]
      default: welch
      description: Simple per-feature statistical test used as an explicit method or as the auto fallback when Bioconductor DE methods are unavailable or unsuitable.
    de_method:
      kind: enum
      enum: [auto, deseq2, edger, limma, welch, t_test, wilcoxon, chi_square]
      default: auto
      description: Differential-expression method. auto prioritizes DESeq2, edgeR, then limma-voom for count matrices, and limma then the selected simple test for quantitative matrices.
    input_data_type:
      kind: enum
      enum: [auto, counts, quantitative]
      default: auto
      description: auto treats non-negative integer matrices as counts and otherwise as quantitative values.
    transform_counts:
      kind: boolean
      default: true
      description: Use log2(count + pseudocount) values for count-matrix statistical testing while reporting fold-change on raw means.
  outputs:
    results:
      kind: file
      glob: de-results.tsv
      required: true
    significant:
      kind: file
      glob: de-significant.tsv
      required: true
    plot:
      kind: file
      glob: de-plot.svg
      required: true
    volcano_plot:
      kind: file
      glob: de-volcano.svg
      required: true
    quadrant_plot:
      kind: file
      glob: de-quadrant.svg
      required: false
    beeswarm_plot:
      kind: file
      glob: de-beeswarm.svg
      required: false
    summary:
      kind: json
      required: true
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 600s
    exposed: true
execution:
  argv:
    - Rscript
    - ./bin/differential_expression_basic.R
    - ${inputs.matrix}
    - ${inputs.metadata}
    - ${outdir}
    - ${params.group_column}
    - ${params.case_group}
    - ${params.control_group}
    - ${params.sample_column}
    - ${params.delimiter}
    - ${params.row_names}
    - ${params.pseudocount}
    - ${params.log2fc_threshold}
    - ${params.pvalue_threshold}
    - ${params.comparisons}
    - ${params.stat_test}
    - ${params.input_data_type}
    - ${params.transform_counts}
    - ${params.de_method}
