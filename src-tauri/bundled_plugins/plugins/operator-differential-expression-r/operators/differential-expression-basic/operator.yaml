apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: omics_differential_expression_basic
  version: 0.1.0
  name: Basic Differential Expression
  description: Run bulk RNA-seq differential expression with DESeq2/edgeR/limma priority and Wilcoxon, chi-square, or t-test fallbacks over one or more metadata group comparisons.
  tags: [omics, differential-expression, bulk-rnaseq, deseq2, edger, limma, r]
interface:
  inputs:
    matrix:
      kind: file
      required: true
      description: Numeric feature-by-sample matrix with feature ids in the first column by default.
    metadata:
      kind: file
      required: true
      description: Sample metadata table containing sample and group columns.
  params:
    group_column:
      kind: string
      required: true
      non_empty: true
      description: Metadata column containing group labels.
    case_group:
      kind: string
      default: ""
      description: Optional numerator/case group. When omitted with control_group, all pairwise group comparisons are run.
    control_group:
      kind: string
      default: ""
      description: Optional denominator/control group. When omitted with case_group, all pairwise group comparisons are run.
    sample_column:
      kind: string
      default: sample
      non_empty: true
      description: Metadata column containing sample ids matching matrix columns.
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    row_names:
      kind: boolean
      default: true
    pseudocount:
      kind: number
      default: 1
      minimum: 0
    log2fc_threshold:
      kind: number
      required: true
      minimum: 0
      description: Absolute log2 fold-change threshold for significant-gene calls. This curated operator asks before using a default.
    pvalue_threshold:
      kind: number
      required: true
      minimum: 0
      maximum: 1
      description: Adjusted p-value/FDR threshold for significant-gene calls. This curated operator asks before using a default.
    comparisons:
      kind: string
      default: ""
      description: Optional comparison list such as "A:B,B:C" or "A vs B; A vs C". Overrides case/control groups.
    stat_test:
      kind: enum
      enum: [welch, t_test, wilcoxon, chi_square]
      default: welch
      description: Simple per-feature statistical test used as an explicit method or as the auto fallback when Bioconductor DE methods are unavailable or unsuitable.
    de_method:
      kind: enum
      enum: [auto, deseq2, edger, limma, welch, t_test, wilcoxon, chi_square]
      required: true
      description: Differential-expression method. auto prioritizes DESeq2, edgeR, then limma-voom for count matrices, and limma then the selected simple test for quantitative matrices.
    input_data_type:
      kind: enum
      enum: [auto, counts, quantitative]
      required: true
      description: auto treats non-negative integer matrices as counts and otherwise as quantitative values.
    transform_counts:
      kind: boolean
      default: true
      description: Use log2(count + pseudocount) values for count-matrix statistical testing while reporting fold-change on raw means.
  outputs:
    results:
      kind: file
      glob: de-results.tsv
      required: true
    significant:
      kind: file
      glob: de-significant.tsv
      required: true
    plot:
      kind: file
      glob: de-plot.svg
      required: true
    volcano_plot:
      kind: file
      glob: de-volcano.svg
      required: true
    quadrant_plot:
      kind: file
      glob: de-quadrant.svg
      required: false
    beeswarm_plot:
      kind: file
      glob: de-beeswarm.svg
      required: false
    summary:
      kind: json
      required: true
preflight:
  questions:
    - id: input_data_type
      param: input_data_type
      question: 差异表达前，请选择输入矩阵的数据类型？
      header: 数据类型
      askWhen:
        missing: true
        empty: true
        values: [auto]
      options:
        - label: Counts
          value: counts
          description: 原始非负整数 read counts；适合 DESeq2、edgeR、limma-voom。
        - label: Quantitative
          value: quantitative
          description: TPM/FPKM/CPM/log2 表达量等已标准化连续矩阵；优先 limma。
        - label: Auto
          value: auto
          description: 由 Omiga 按矩阵是否为非负整数自动判断；不确定时才选择。
    - id: de_method
      param: de_method
      question: 差异表达前，请选择主要统计方法？
      header: DE方法
      askWhen:
        missing: true
        empty: true
        values: [auto]
      options:
        - label: DESeq2
          value: deseq2
          description: bulk RNA-seq 原始 counts 的常用稳健默认；每组至少 2 个样本更合适。
        - label: edgeR
          value: edger
          description: 原始 counts 的负二项模型；小样本场景也常用。
        - label: limma
          value: limma
          description: 标准化/连续表达矩阵优先；counts 时使用 limma-voom。
        - label: Auto
          value: auto
          description: 按数据类型和环境可用包自动尝试，并可能 fallback 到简单检验。
    - id: pvalue_threshold
      param: pvalue_threshold
      question: 显著差异基因使用哪个 FDR 阈值？
      header: FDR阈值
      askWhen:
        missing: true
        empty: true
      options:
        - label: FDR 0.05
          value: 0.05
          description: 常用默认：Benjamini-Hochberg 校正后 FDR < 0.05。
        - label: FDR 0.01
          value: 0.01
          description: 更严格，降低假阳性但会减少候选基因。
        - label: FDR 0.10
          value: 0.10
          description: 更宽松，探索性分析可用。
    - id: log2fc_threshold
      param: log2fc_threshold
      question: 显著差异基因使用哪个 |log2FC| 阈值？
      header: FC阈值
      askWhen:
        missing: true
        empty: true
      options:
        - label: "|log2FC|≥1"
          value: 1
          description: 常用默认：至少 2 倍变化。
        - label: "|log2FC|≥0.58"
          value: 0.58
          description: 约 1.5 倍变化，更适合温和效应探索。
        - label: "|log2FC|≥0"
          value: 0
          description: 只按显著性筛选，不额外设 fold-change 门槛。
        - label: "|log2FC|≥2"
          value: 2
          description: 至少 4 倍变化，强调大效应基因。
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 600s
    exposed: true
execution:
  argv:
    - Rscript
    - ./bin/differential_expression_basic.R
    - ${inputs.matrix}
    - ${inputs.metadata}
    - ${outdir}
    - ${params.group_column}
    - ${params.case_group}
    - ${params.control_group}
    - ${params.sample_column}
    - ${params.delimiter}
    - ${params.row_names}
    - ${params.pseudocount}
    - ${params.log2fc_threshold}
    - ${params.pvalue_threshold}
    - ${params.comparisons}
    - ${params.stat_test}
    - ${params.input_data_type}
    - ${params.transform_counts}
    - ${params.de_method}
