apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_rank
  version: 0.1.0
  name: Rank Scatter
  description: Ranked feature scatter plot with effect-size color gradient, size scaling, and labeled extreme ranks.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - rank
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - rank
    - differential
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with rank, effect value, and label columns. See example.tsv converted from OmicsAgent scatter/rank data.json.
  params:
    rank_column:
      kind: string
      default: rank
    value_column:
      kind: string
      default: log2FC
    label_column:
      kind: string
      default: symbol
    title:
      kind: string
      default: Yap1-KO
    x_label:
      kind: string
      default: Rank
    y_label:
      kind: string
      default: log2FC
    low_color:
      kind: string
      default: '#7fbc41'
    mid_color:
      kind: string
      default: '#f7f7f7'
    high_color:
      kind: string
      default: '#de77ae'
    point_size_min:
      kind: number
      default: 0.8
    point_size_max:
      kind: number
      default: 3.8
    point_alpha:
      kind: number
      default: 0.85
    highlight_top_k:
      kind: integer
      default: 10
      description: Number of lowest-rank and highest-rank features to highlight and label.
    highlight_size:
      kind: number
      default: 5
    label_size:
      kind: number
      default: 3
    max_overlaps:
      kind: integer
      default: 2000
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 6
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_rank
  - ranked_scatter
  - rank_scatter
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.rank_column}
    - ${params.value_column}
    - ${params.label_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.low_color}
    - ${params.mid_color}
    - ${params.high_color}
    - ${params.point_size_min}
    - ${params.point_size_max}
    - ${params.point_alpha}
    - ${params.highlight_top_k}
    - ${params.highlight_size}
    - ${params.label_size}
    - ${params.max_overlaps}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
