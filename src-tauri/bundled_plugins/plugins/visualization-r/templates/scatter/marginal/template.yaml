apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_marginal
  version: 0.1.0
  name: Marginal Scatter
  description: Scatter plot with linear fit, correlation annotation, and grouped marginal boxplots.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - marginal
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - marginal
    - correlation
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with x, y, and optional group columns. See example.tsv converted from OmicsAgent scatter/marginal data.json.
  params:
    x_column:
      kind: string
      default: x
    y_column:
      kind: string
      default: y
    group_column:
      kind: string
      default: group
      description: Optional color/fill group column. Use an empty string for one group.
    group_order:
      kind: string
      default: ''
      description: Optional comma-separated group order. Empty keeps first-seen order.
    title:
      kind: string
      default: Marginal Scatter
    x_label:
      kind: string
      default: X value
    y_label:
      kind: string
      default: Y value
    palette:
      kind: string
      default: '#333463,#079C9C'
    point_alpha:
      kind: number
      default: 0.7
    point_size:
      kind: number
      default: 2
    show_fit:
      kind: boolean
      default: true
    fit_se:
      kind: boolean
      default: true
    fit_alpha:
      kind: number
      default: 0.2
    fit_width:
      kind: number
      default: 0.8
    show_cor:
      kind: boolean
      default: true
    cor_method:
      kind: enum
      enum: [pearson, spearman, kendall]
      default: pearson
    marginal_type:
      kind: enum
      enum: [boxplot, none]
      default: boxplot
    marginal_size:
      kind: number
      default: 1.2
      description: Marginal panel size in inches.
    marginal_alpha:
      kind: number
      default: 0.35
    marginal_width:
      kind: number
      default: 0.55
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 6.5
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_marginal
  - marginal_scatter
  - scatter_with_marginals
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.x_column}
    - ${params.y_column}
    - ${params.group_column}
    - ${params.group_order}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.palette}
    - ${params.point_alpha}
    - ${params.point_size}
    - ${params.show_fit}
    - ${params.fit_se}
    - ${params.fit_alpha}
    - ${params.fit_width}
    - ${params.show_cor}
    - ${params.cor_method}
    - ${params.marginal_type}
    - ${params.marginal_size}
    - ${params.marginal_alpha}
    - ${params.marginal_width}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
