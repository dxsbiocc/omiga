# Omiga LLM Configuration Example
# Copy to `omiga.yaml` in the project root, then replace placeholders.
#
# Fastest real-runtime validation path for Agent 编排:
# 1. DeepSeek
#    export DEEPSEEK_API_KEY="your-key"
# 2. Custom OpenAI-compatible endpoint
#    export LLM_API_KEY="dummy-or-real-key"
#    export LLM_BASE_URL="http://localhost:11434/v1/chat/completions"
#    export LLM_MODEL="your-model"

version: "1.0"
default: "deepseek"

providers:
  deepseek:
    type: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat
    enabled: true

  custom:
    type: custom
    api_key: ${LLM_API_KEY}
    base_url: ${LLM_BASE_URL}
    model: ${LLM_MODEL}
    enabled: false

  openai:
    type: openai
    api_key: ${OPENAI_API_KEY}
    model: gpt-4o
    enabled: false

settings:
  max_tokens: 4096
  temperature: 0.7
  timeout: 600
  enable_tools: true
  web_use_proxy: true
  web_search_engine: ddg
  web_search_methods: [tavily, exa, firecrawl, parallel, google, bing, ddg]
