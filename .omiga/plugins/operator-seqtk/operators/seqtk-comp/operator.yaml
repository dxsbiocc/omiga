apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: seqtk_comp
  version: 0.1.0
  name: seqtk Comp
  description: Use seqtk comp to write per-read base composition for FASTQ/FASTA input.
  tags: [seqtk, fastq, fasta, composition]
interface:
  inputs:
    reads:
      kind: file
      required: true
      description: FASTQ/FASTA input for per-read base composition statistics.
  params: {}
  outputs:
    composition:
      kind: file
      glob: seqtk-comp.tsv
      required: true
    summary:
      kind: json
      required: true
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 300s
    exposed: true
execution:
  argv:
    - /bin/sh
    - ./scripts/seqtk_comp.sh
    - ${inputs.reads}
    - ${outdir}
