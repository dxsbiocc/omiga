apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_paired
  version: 0.1.0
  name: Paired Scatter
  description: Paired scatter/line plot for matched samples across categorical conditions with optional paired significance brackets.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - paired
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - paired
    - line
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with paired sample ID, categorical condition, and numeric value columns. See example.tsv converted from OmicsAgent scatter/paired data.json.
  params:
    condition_column:
      kind: string
      default: drug
    value_column:
      kind: string
      default: auc
    pair_column:
      kind: string
      default: cell_line
    condition_order:
      kind: string
      default: ''
      description: Optional comma-separated condition order. Empty keeps first-seen order.
    title:
      kind: string
      default: DepMap Cell Line
    x_label:
      kind: string
      default: ''
    y_label:
      kind: string
      default: AUC
    palette:
      kind: string
      default: '#8F499C,#4185BE,#6DC067,#F6DB35,#F78822'
    line_color:
      kind: string
      default: '#caccd1'
    line_width:
      kind: number
      default: 0.35
    line_alpha:
      kind: number
      default: 0.55
    point_size_outer:
      kind: number
      default: 4
    point_size_inner:
      kind: number
      default: 3
    point_alpha:
      kind: number
      default: 0.9
    point_stroke:
      kind: number
      default: 0.5
    point_spread:
      kind: number
      default: 0.16
    show_significance:
      kind: boolean
      default: true
    test:
      kind: enum
      enum: [wilcox.test, t.test]
      default: wilcox.test
    alpha:
      kind: number
      default: 0.05
    max_brackets:
      kind: integer
      default: 3
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 4
    height:
      kind: number
      default: 4
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_paired
  - paired_scatter
  - paired_line_scatter
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.condition_column}
    - ${params.value_column}
    - ${params.pair_column}
    - ${params.condition_order}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.palette}
    - ${params.line_color}
    - ${params.line_width}
    - ${params.line_alpha}
    - ${params.point_size_outer}
    - ${params.point_size_inner}
    - ${params.point_alpha}
    - ${params.point_stroke}
    - ${params.point_spread}
    - ${params.show_significance}
    - ${params.test}
    - ${params.alpha}
    - ${params.max_brackets}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
