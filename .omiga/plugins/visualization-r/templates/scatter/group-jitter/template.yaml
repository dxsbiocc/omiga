apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_group_jitter
  version: 0.1.0
  name: Group Jitter
  description: Grouped differential jitter scatter with category bands, background extent columns, change colors, and top gene labels.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - jitter
    - differential
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - jitter
    - grouped
    - differential
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with category, log fold-change, direction, adjusted p-value, and label columns. See example.tsv converted from OmicsAgent scatter/jitter_group data.json.
  params:
    category_column:
      kind: string
      default: cate
    value_column:
      kind: string
      default: logFC
    sign_column:
      kind: string
      default: sign
    pvalue_column:
      kind: string
      default: adj.P.Val
    label_column:
      kind: string
      default: symbol
    category_order:
      kind: string
      default: ''
      description: Optional comma-separated category order. Empty keeps first-seen order.
    sign_order:
      kind: string
      default: Down,Up
      description: Comma-separated sign order for colors and legend.
    title:
      kind: string
      default: Yap1 Overexpression and Knockout
    y_label:
      kind: string
      default: log2FC
    sign_palette:
      kind: string
      default: '#2dde98,#ff6c5f'
    tile_palette:
      kind: string
      default: '#3be8b0,#1aafd0,#6a67ce,#ffb900,#fc636b'
    label_colors:
      kind: string
      default: '#595d7a,#595d7a,#c5c5c5,#595d7a,#595d7a'
    background_fill:
      kind: string
      default: '#ebf3f5'
    link_color:
      kind: string
      default: '#8a8b8c'
    jitter_width:
      kind: number
      default: 0.4
    point_size:
      kind: number
      default: 1.7
    point_alpha:
      kind: number
      default: 0.72
    top_k:
      kind: integer
      default: 5
    tile_height:
      kind: number
      default: 1.4
    background_width:
      kind: number
      default: 0.8
    random_seed:
      kind: integer
      default: 1234
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_jitter_group
  - jitter_group
  - group_jitter
  - grouped_jitter_scatter
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.category_column}
    - ${params.value_column}
    - ${params.sign_column}
    - ${params.pvalue_column}
    - ${params.label_column}
    - ${params.category_order}
    - ${params.sign_order}
    - ${params.title}
    - ${params.y_label}
    - ${params.sign_palette}
    - ${params.tile_palette}
    - ${params.label_colors}
    - ${params.background_fill}
    - ${params.link_color}
    - ${params.jitter_width}
    - ${params.point_size}
    - ${params.point_alpha}
    - ${params.top_k}
    - ${params.tile_height}
    - ${params.background_width}
    - ${params.random_seed}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
